<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UTM Finder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #f5f5f5;
    }

    header {
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    header h1 { font-size: 1rem; font-weight: 600; color: #222; white-space: nowrap; }

    #search-wrap { display: flex; gap: 6px; flex: 1; min-width: 200px; }

    #search {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.875rem;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      font-size: 0.875rem;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
    }
    button:hover { background: #1d4ed8; }
    button.secondary {
      background: #fff;
      color: #2563eb;
      border: 1px solid #2563eb;
    }
    button.secondary:hover { background: #eff6ff; }

    /* Map + overlay container */
    #map-wrap { flex: 1; min-height: 0; position: relative; }
    #map { width: 100%; height: 100%; }
    .leaflet-container { cursor: crosshair !important; }

    /* Upload overlay */
    #upload-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 1000;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(2px);
      align-items: center;
      justify-content: center;
    }
    #upload-overlay.visible { display: flex; }

    #upload-box {
      background: rgba(255,255,255,0.92);
      border: 2px dashed #93c5fd;
      border-radius: 12px;
      padding: 52px 60px;
      text-align: center;
      min-width: 340px;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transition: border-color 0.15s, background 0.15s;
    }
    #upload-box.drag-over {
      border-color: #2563eb;
      background: rgba(239,246,255,0.96);
    }

    #upload-box .icon { font-size: 2.5rem; line-height: 1; }

    #upload-box h2 { font-size: 1rem; font-weight: 600; color: #1e293b; }

    #upload-box p { font-size: 0.8rem; color: #64748b; line-height: 1.5; }

    #upload-box .formats {
      font-size: 0.75rem;
      color: #94a3b8;
      background: #f1f5f9;
      border-radius: 6px;
      padding: 6px 12px;
    }

    #upload-box .btn-row { display: flex; gap: 8px; margin-top: 4px; justify-content: center; }

    #upload-error {
      font-size: 0.8rem;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 8px 12px;
      width: 100%;
      display: none;
    }
    #upload-error.visible { display: block; }

    /* Spinner */
    #upload-spinner {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    #upload-spinner.visible { display: flex; }
    #upload-drop-content.hidden { display: none; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result bar */
    #result-bar {
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      font-size: 0.875rem;
      color: #333;
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #result-bar.error { color: #dc2626; }
    #result-bar.loading { color: #888; }
    #result-bar.empty { color: #aaa; }
    #result-zone { font-weight: 700; font-size: 1rem; }
    #result-crs  { color: #555; }
    #result-coords { color: #888; font-size: 0.8rem; margin-left: auto; }
  </style>
</head>
<body>

<header>
  <h1>UTM Finder</h1>
  <div id="search-wrap">
    <input id="search" type="text" placeholder="Search a place…" />
    <button id="search-btn">Go</button>
  </div>
  <button class="secondary" id="open-upload-btn">Upload file</button>
</header>

<div id="map-wrap">
  <div id="map"></div>

  <div id="upload-overlay">
    <div id="upload-box">

      <div id="upload-drop-content">
        <div class="icon">📂</div>
        <h2>Upload a spatial file</h2>
        <p>Drag and drop your file here, or browse to select one.<br>The file must be in <strong>WGS84</strong> (EPSG:4326).</p>
        <div class="formats">Accepted formats: GeoTIFF (.tif, .tiff) · KML (.kml)</div>
        <div id="upload-error"></div>
        <div class="btn-row">
          <button class="secondary" id="cancel-upload-btn">Cancel</button>
          <button id="browse-btn">Browse</button>
        </div>
      </div>

      <div id="upload-spinner">
        <div class="spinner"></div>
        <p style="color:#64748b;font-size:0.85rem;">Uploading and detecting UTM zone…</p>
      </div>

    </div>
  </div>
</div>

<div id="result-bar" class="empty">
  <span id="result-zone">Click the map or search a place to get its UTM zone.</span>
  <span id="result-crs"></span>
  <span id="result-coords"></span>
</div>

<input id="file-input" type="file" accept=".tif,.tiff,.kml" style="display:none" />

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map("map").setView([20, 0], 2);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors",
    maxZoom: 19,
  }).addTo(map);

  let marker = null;

  function setMarker(lat, lon, popupText) {
    if (marker) marker.setLatLng([lat, lon]);
    else marker = L.marker([lat, lon]).addTo(map);
    if (popupText) marker.bindPopup(popupText).openPopup();
  }

  function showResult(data, lat, lon) {
    const bar = document.getElementById("result-bar");
    bar.className = "";
    const band = data.zone_letter ? ` (band ${data.zone_letter})` : "";
    document.getElementById("result-zone").textContent =
      `UTM Zone ${data.zone_number}${data.hemisphere}${band}`;
    document.getElementById("result-crs").textContent =
      `${data.crs_code} — ${data.crs_name}`;
    document.getElementById("result-coords").textContent =
      `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
  }

  function showLoading() {
    const bar = document.getElementById("result-bar");
    bar.className = "loading";
    document.getElementById("result-zone").textContent = "Looking up UTM zone…";
    document.getElementById("result-crs").textContent = "";
    document.getElementById("result-coords").textContent = "";
  }

  function showError(msg) {
    const bar = document.getElementById("result-bar");
    bar.className = "error";
    document.getElementById("result-zone").textContent = msg;
    document.getElementById("result-crs").textContent = "";
    document.getElementById("result-coords").textContent = "";
  }

  async function queryUTM(lat, lon) {
    showLoading();
    const res = await fetch("/utm", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ lat, lon }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error ?? "Unknown error"); return; }
    const band = data.zone_letter ? ` (band ${data.zone_letter})` : "";
    const popup = `<b>UTM Zone ${data.zone_number}${data.hemisphere}${band}</b><br>${data.crs_code}`;
    setMarker(lat, lon, popup);
    showResult(data, lat, lon);
  }

  // Map click
  map.on("click", (e) => queryUTM(e.latlng.lat, e.latlng.lng));

  // Place search
  async function doSearch() {
    const q = document.getElementById("search").value.trim();
    if (!q) return;
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,
      { headers: { "Accept-Language": "en" } }
    );
    const results = await res.json();
    if (!results.length) { showError(`No results for "${q}"`); return; }
    const { lat, lon } = results[0];
    map.flyTo([lat, lon], 8);
    queryUTM(parseFloat(lat), parseFloat(lon));
  }

  document.getElementById("search-btn").addEventListener("click", doSearch);
  document.getElementById("search").addEventListener("keydown", (e) => {
    if (e.key === "Enter") doSearch();
  });

  // ── Upload overlay ──────────────────────────────────────────────────────────
  const overlay      = document.getElementById("upload-overlay");
  const uploadBox    = document.getElementById("upload-box");
  const dropContent  = document.getElementById("upload-drop-content");
  const spinner      = document.getElementById("upload-spinner");
  const uploadError  = document.getElementById("upload-error");
  const fileInput    = document.getElementById("file-input");

  function openOverlay() {
    setOverlayIdle();
    overlay.classList.add("visible");
  }

  function closeOverlay() {
    overlay.classList.remove("visible");
    fileInput.value = "";
  }

  function setOverlayIdle() {
    dropContent.classList.remove("hidden");
    spinner.classList.remove("visible");
    uploadError.classList.remove("visible");
    uploadError.textContent = "";
  }

  function setOverlayLoading() {
    dropContent.classList.add("hidden");
    spinner.classList.add("visible");
    uploadError.classList.remove("visible");
  }

  function setOverlayError(msg) {
    dropContent.classList.remove("hidden");
    spinner.classList.remove("visible");
    uploadError.textContent = msg;
    uploadError.classList.add("visible");
  }

  document.getElementById("open-upload-btn").addEventListener("click", openOverlay);
  document.getElementById("cancel-upload-btn").addEventListener("click", closeOverlay);
  document.getElementById("browse-btn").addEventListener("click", () => fileInput.click());

  // Close overlay when clicking outside the box
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) closeOverlay();
  });

  // Drag-and-drop on the box
  uploadBox.addEventListener("dragover", (e) => {
    e.preventDefault();
    uploadBox.classList.add("drag-over");
  });
  uploadBox.addEventListener("dragleave", () => uploadBox.classList.remove("drag-over"));
  uploadBox.addEventListener("drop", (e) => {
    e.preventDefault();
    uploadBox.classList.remove("drag-over");
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  // Also allow dragging onto the map itself to open overlay + accept drop
  const mapWrap = document.getElementById("map-wrap");
  mapWrap.addEventListener("dragover", (e) => {
    e.preventDefault();
    openOverlay();
    uploadBox.classList.add("drag-over");
  });

  fileInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (file) handleFile(file);
  });

  async function handleFile(file) {
    const name = file.name.toLowerCase();
    if (!name.endsWith(".tif") && !name.endsWith(".tiff") && !name.endsWith(".kml")) {
      setOverlayError("Unsupported file type. Please upload a GeoTIFF (.tif, .tiff) or KML (.kml) file.");
      return;
    }

    const MAX_BYTES = 5 * 1024 * 1024 * 1024;
    if (file.size > MAX_BYTES) {
      setOverlayError(`File is too large (${(file.size / 1024 / 1024 / 1024).toFixed(1)} GB). Maximum size is 5 GB.`);
      return;
    }

    setOverlayLoading();

    const form = new FormData();
    form.append("file", file);

    let data, res;
    try {
      res = await fetch("/utm/file", { method: "POST", body: form });
    } catch {
      setOverlayError("Upload failed — check your connection and try again.");
      return;
    }

    try {
      data = await res.json();
    } catch {
      if (res.status === 413) {
        setOverlayError("File is too large (limit: 50 MB).");
      } else {
        setOverlayError(`Server error (${res.status}). Try again.`);
      }
      return;
    }

    fileInput.value = "";

    if (!res.ok) {
      setOverlayError(data.error ?? "Unknown error.");
      return;
    }

    closeOverlay();

    const lat = data.centroid_lat;
    const lon = data.centroid_lon;
    const band = data.zone_letter ? ` (band ${data.zone_letter})` : "";
    const popup = `<b>UTM Zone ${data.zone_number}${data.hemisphere}${band}</b><br>${data.crs_code}`;
    map.flyTo([lat, lon], 8);
    setMarker(lat, lon, popup);
    showResult(data, lat, lon);
  }
</script>
</body>
</html>
