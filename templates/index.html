<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UTM Finder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #f5f5f5;
    }

    header {
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    header h1 { font-size: 1rem; font-weight: 600; color: #222; white-space: nowrap; }

    #search-wrap { display: flex; gap: 6px; min-width: 0; }

    #search {
      width: 220px;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.875rem;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      font-size: 0.875rem;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
    }
    button:hover { background: #1d4ed8; }
    button.secondary {
      background: #fff;
      color: #2563eb;
      border: 1px solid #2563eb;
    }
    button.secondary:hover { background: #eff6ff; }

    /* Map + overlay container */
    #map-wrap { flex: 1; min-height: 0; position: relative; }
    #map { width: 100%; height: 100%; }
    .leaflet-container { cursor: crosshair !important; }

    /* Upload overlay */
    #upload-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 1000;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(2px);
      align-items: center;
      justify-content: center;
    }
    #upload-overlay.visible { display: flex; }

    #upload-box {
      background: rgba(255,255,255,0.92);
      border: 2px dashed #93c5fd;
      border-radius: 12px;
      padding: 64px 72px;
      text-align: center;
      min-width: 360px;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 50px;
      transition: border-color 0.15s, background 0.15s;
    }
    #upload-box.drag-over {
      border-color: #2563eb;
      background: rgba(239,246,255,0.96);
    }

    #upload-box .icon { font-size: 3rem; line-height: 1; }

    #upload-box h2 { font-size: 1.1rem; font-weight: 600; color: #1e293b; }

    #upload-box p { font-size: 0.875rem; color: #64748b; line-height: 1.6; }

    #upload-box .formats {
      font-size: 0.8rem;
      color: #94a3b8;
      background: #f1f5f9;
      border-radius: 6px;
      padding: 8px 16px;
    }

    #upload-drop-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #upload-box .btn-row { display: flex; gap: 12px; justify-content: center; }

    #upload-error {
      font-size: 0.8rem;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 8px 12px;
      width: 100%;
      display: none;
    }
    #upload-error.visible { display: block; }

    /* Spinner */
    #upload-spinner {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    #upload-spinner.visible { display: flex; }
    #upload-drop-content.hidden { display: none; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result bar */
    #result-bar {
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      font-size: 0.875rem;
      color: #333;
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #result-bar.error { color: #dc2626; }
    #result-bar.loading { color: #888; }
    #result-bar.empty { color: #aaa; }
    #result-zone { font-weight: 700; font-size: 1rem; }
    #result-crs  { color: #555; }
    #result-coords { color: #888; font-size: 0.8rem; }
  </style>
</head>
<body>

<header>
  <h1>UTM Finder</h1>
  <button id="open-upload-btn">Upload file</button>
  <div id="search-wrap">
    <input id="search" type="text" placeholder="Search a place…" />
    <button class="secondary" id="search-btn">Go</button>
  </div>
</header>

<div id="result-bar" class="empty">
  <span id="result-zone">Click the map or search a place to get its UTM zone.</span>
  <span id="result-crs"></span>
  <span id="result-coords"></span>
</div>

<div id="map-wrap">
  <div id="map"></div>

  <div id="upload-overlay">
    <div id="upload-box">

      <div id="upload-drop-content">
        <h2>Upload a File</h2>
        <p>Drag and drop your file here, or browse to select one.</p>
        <div class="formats">Accepted formats: KML (.kml) · KMZ (.kmz)</div>
        <div id="upload-error"></div>
        <div class="btn-row">
          <button class="secondary" id="cancel-upload-btn">Cancel</button>
          <button id="browse-btn">Browse</button>
        </div>
      </div>

      <div id="upload-spinner">
        <div class="spinner"></div>
        <p style="color:#64748b;font-size:0.85rem;">Uploading and detecting UTM zone…</p>
      </div>

    </div>
  </div>
</div>

<input id="file-input" type="file" accept=".kml,.kmz" style="display:none" />

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>const MAX_FILE_BYTES = {{ max_file_bytes }};</script>
<script src="{{ url_for('static', filename='app.js') }}?v={{ app_js_v }}"></script>
</body>
</html>
